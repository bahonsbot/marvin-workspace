<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Intel News</title>
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0f0f1a;
            --card-bg: #1a1a2e;
            --text: #e0e0e0;
            --text-dim: #888;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --border: #2a2a4a;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        header {
            background: var(--card-bg);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        
        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .filter-btn {
            background: var(--border);
            border: none;
            color: var(--text);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .filter-btn.active {
            background: var(--accent);
            color: white;
        }
        
        .filter-btn:active {
            transform: scale(0.95);
        }
        
        .feed {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .news-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        
        .news-card:active {
            transform: scale(0.98);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        
        .source {
            font-size: 12px;
            color: var(--text-dim);
        }
        
        .source-badge {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }
        
        .card-title {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        
        .card-title a {
            color: inherit;
            text-decoration: none;
        }
        
        .card-categories {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .category-tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 6px;
            background: var(--border);
            color: var(--text-dim);
        }
        
        .category-tag.geopolitical { background: #dc2626; color: white; }
        .category-tag.financial { background: #7c3aed; color: white; }
        .category-tag.macro { background: #059669; color: white; }
        .category-tag.corporate { background: #d97706; color: white; }
        .category-tag.sentiment { background: #db2777; color: white; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            transition: transform 0.2s;
        }
        
        .refresh-btn:active {
            transform: scale(0.9);
        }
        
        .loading {
            opacity: 0.5;
        }
        
        .last-updated {
            text-align: center;
            padding: 12px;
            font-size: 12px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <header>
        <h1>📈 Market Intel News</h1>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="geopolitical">🌍 Geo</button>
            <button class="filter-btn" data-filter="financial">💰 Finance</button>
            <button class="filter-btn" data-filter="macro">📈 Macro</button>
            <button class="filter-btn" data-filter="corporate">🏢 Corp</button>
            <button class="filter-btn" data-filter="sentiment">🔥 Sentiment</button>
        </div>
    </header>
    
    <div class="feed" id="feed">
        <div class="empty-state">Loading...</div>
    </div>
    
    <div class="last-updated" id="lastUpdated"></div>
    
    <button class="refresh-btn" onclick="loadFeed()">↻</button>
    
    <script>
        let newsData = [];
        let currentFilter = 'all';
        
        async function loadFeed() {
            const feed = document.getElementById('feed');
            const lastUpdated = document.getElementById('lastUpdated');
            feed.classList.add('loading');
            
            try {
                const response = await fetch('news_feed.json');
                const data = await response.json();
                newsData = data.items || [];
                
                lastUpdated.textContent = `Updated: ${new Date(data.generated).toLocaleString()}`;
                renderFeed();
            } catch (error) {
                feed.innerHTML = '<div class="empty-state">Error loading feed. Pull to refresh.</div>';
            }
            
            feed.classList.remove('loading');
        }
        
        function renderFeed() {
            const feed = document.getElementById('feed');
            
            const filtered = currentFilter === 'all' 
                ? newsData 
                : newsData.filter(item => item.category.includes(currentFilter));
            
            if (filtered.length === 0) {
                feed.innerHTML = '<div class="empty-state">No news in this category</div>';
                return;
            }
            
            feed.innerHTML = filtered.map(item => `
                <div class="news-card">
                    <div class="card-header">
                        <span class="source">${item.source}</span>
                        <span class="source-badge">${item.type}</span>
                    </div>
                    <div class="card-title">
                        <a href="${item.url}" target="_blank">${item.title}</a>
                    </div>
                    ${item.summary ? `<p style="font-size: 13px; color: var(--text-dim); margin-bottom: 8px;">${item.summary}</p>` : ''}
                    <div class="card-categories">
                        ${item.category.map(cat => `<span class="category-tag ${cat}">${cat}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderFeed();
            });
        });
        
        // Load on start
        loadFeed();
        
        // Auto-refresh every 5 minutes
        setInterval(loadFeed, 5 * 60 * 1000);
    </script>
</body>
</html>
