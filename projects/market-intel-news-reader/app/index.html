<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Intel News</title>
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0f0f1a;
            --card-bg: #1a1a2e;
            --text: #e0e0e0;
            --text-dim: #888;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --border: #2a2a4a;
        }

        body.light-theme {
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #111827;
            --text-dim: #6b7280;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --border: #d1d5db;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        header {
            background: var(--card-bg);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .theme-toggle {
            background: var(--border);
            border: none;
            color: var(--text);
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }
        
        .filters {
            display: flex;
            gap: 8px;
            padding-bottom: 4px;
            overflow-x: auto;
        }
        
        .source-btn {
            background: var(--border);
            border: none;
            color: var(--text);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .source-btn.active {
            background: var(--accent);
            color: white;
        }
        
        .source-btn:active {
            transform: scale(0.95);
        }
        
        .filter-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .filter-btn.active {
            background: var(--border);
            color: var(--text);
        }
        
        .feed {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .news-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        
        .news-card:active {
            transform: scale(0.98);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        
        .source {
            font-size: 12px;
            color: var(--text-dim);
        }

        .source-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .timestamp {
            font-size: 11px;
            color: var(--text-dim);
        }
        
        .source-badge {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }
        
        .card-title {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        
        .card-title a {
            color: inherit;
            text-decoration: none;
        }
        
        .card-categories {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .category-tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 6px;
            background: var(--border);
            color: var(--text-dim);
        }
        
        .category-tag.geopolitical { background: #dc2626; color: white; }
        .category-tag.financial { background: #7c3aed; color: white; }
        .category-tag.macro { background: #059669; color: white; }
        .category-tag.corporate { background: #d97706; color: white; }
        .category-tag.sentiment { background: #db2777; color: white; }
        .category-tag.other { background: #6b7280; color: white; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            transition: transform 0.2s;
        }
        
        .refresh-btn:active {
            transform: scale(0.9);
        }
        
        .loading {
            opacity: 0.5;
        }
        
        .last-updated {
            text-align: center;
            padding: 12px;
            font-size: 12px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <h1>📈 Market Intel News</h1>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀️ Light</button>
        </div>
        <button class="filter-btn" id="favoritesToggle" style="margin: 8px 0;">⭐ Show Favorites</button>
        
        <div class="filters" style="margin-bottom: 8px;">
            <button class="source-btn active" data-source="all">All</button>
            <button class="source-btn" data-source="rss">📰 RSS</button>
            <button class="source-btn" data-source="reddit">💬 Reddit</button>
        </div>
        
        <div class="filters" style="margin-bottom: 4px;">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="geopolitical">🌍 Geo</button>
            <button class="filter-btn" data-filter="financial">💰</button>
            <button class="filter-btn" data-filter="macro">📈</button>
            <button class="filter-btn" data-filter="corporate">🏢</button>
            <button class="filter-btn" data-filter="sentiment">🔥</button>
            <button class="filter-btn" data-filter="other">🏷️</button>
        </div>
        <div class="last-updated" id="lastUpdated" style="font-size: 12px; color: #888; margin-bottom: 8px;"></div>
    </header>
    
    <div class="feed" id="feed">
        <div class="empty-state">Loading...</div>
    </div>
    
    <div class="last-updated" id="lastUpdated"></div>
    
    <button class="refresh-btn" onclick="loadFeed()">↻</button>
    
    <script>
        let newsData = [];
        let currentFilter = 'all';
        let currentSource = 'all';

        function getThemePreference() {
            return localStorage.getItem('theme') || 'dark';
        }

        function applyTheme(theme) {
            const isLight = theme === 'light';
            document.body.classList.toggle('light-theme', isLight);
            const themeToggle = document.getElementById('themeToggle');
            themeToggle.textContent = isLight ? '🌙 Dark' : '☀️ Light';
            localStorage.setItem('theme', theme);
        }

        function formatRelativeTime(inputTime) {
            if (!inputTime) return 'Unknown time';

            const date = new Date(inputTime);
            if (Number.isNaN(date.getTime())) return 'Unknown time';

            const now = new Date();
            const diffMs = now - date;
            const diffSeconds = Math.floor(diffMs / 1000);
            const diffMinutes = Math.floor(diffSeconds / 60);
            const diffHours = Math.floor(diffMinutes / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffSeconds < 60) return 'Just now';
            if (diffMinutes < 60) return `${diffMinutes} minute${diffMinutes === 1 ? '' : 's'} ago`;
            if (diffHours < 24) return `${diffHours} hour${diffHours === 1 ? '' : 's'} ago`;
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;

            return date.toLocaleDateString();
        }

        function getSourceIcon(type) {
            return type === 'reddit' ? '👽' : '📰';
        }
        
        async function loadFeed() {
            const feed = document.getElementById('feed');
            const lastUpdated = document.getElementById('lastUpdated');
            feed.classList.add('loading');
            
            // Try multiple paths for GitHub Pages compatibility
            const paths = [
                'news_feed.json',
                '../news_feed.json',
                '../../news_feed.json'
            ];
            
            let data = null;
            for (const path of paths) {
                try {
                    const response = await fetch(path);
                    if (response.ok) {
                        data = await response.json();
                        console.log('Loaded from:', path);
                        break;
                    }
                } catch (e) {
                    console.log('Failed:', path, e);
                }
            }
            
            if (data) {
                newsData = data.items || [];
                lastUpdated.textContent = `Updated: ${new Date(data.generated).toLocaleString()}`;
                renderFeed();
            } else {
                feed.innerHTML = '<div class="empty-state">Error loading feed. Pull to refresh.</div>';
            }
            
            feed.classList.remove('loading');
        }
        
        function renderFeed() {
            const feed = document.getElementById('feed');
            
            let filtered = newsData;
            
            // Filter by source
            if (currentSource !== 'all') {
                filtered = filtered.filter(item => item.type === currentSource);
            }
            
            // Filter by category
            if (currentFilter !== 'all') {
                if (currentFilter === 'favorites') {
                    const favs = getFavorites();
                    filtered = filtered.filter(item => favs.includes(item.id));
                } else {
                    filtered = filtered.filter(item => item.category.includes(currentFilter));
                }
            }
            
            // Sort by publication date (newest first)
            filtered.sort((a, b) => {
                const dateA = new Date(a.published || a.timestamp);
                const dateB = new Date(b.published || b.timestamp);
                return dateB - dateA;
            });
            
            if (filtered.length === 0) {
                feed.innerHTML = '<div class="empty-state">No news in this category</div>';
                return;
            }
            
            feed.innerHTML = filtered.map(item => {
                const relativeTime = formatRelativeTime(item.published || item.timestamp);
                const sourceIcon = getSourceIcon(item.type);
                const isFavorite = getFavorites().includes(item.id);

                return `
                <div class="news-card">
                    <div class="card-header">
                        <div class="source-meta">
                            <span class="source">${sourceIcon} ${item.source}</span>
                            <span class="timestamp">${relativeTime}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <button class="favorite-btn" data-id="${item.id}" onclick="toggleFavorite('${item.id}')" style="background: none; border: none; cursor: pointer; font-size: 18px; padding: 0;">${isFavorite ? '★' : '☆'}</button>
                            <span class="source-badge">${item.type}</span>
                        </div>
                    </div>
                    <div class="card-title">
                        <a href="${item.url}" target="_blank">${item.title}</a>
                    </div>
                    ${item.summary ? `<p style="font-size: 13px; color: var(--text-dim); margin-bottom: 8px;">${item.summary}</p>` : ''}
                    <div class="card-categories">
                        ${item.category.map(cat => `<span class="category-tag ${cat}">${cat}</span>`).join('')}
                    </div>
                </div>
            `;
            }).join('');
        }
        
        // Source buttons (RSS / Reddit)
        document.querySelectorAll('.source-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSource = btn.dataset.source;
                renderFeed();
            });
        });
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                // Reset favorites toggle button styling
                const favoritesToggle = document.getElementById('favoritesToggle');
                favoritesToggle.textContent = '⭐ Show Favorites';
                favoritesToggle.style.background = '';
                favoritesToggle.style.color = '';
                renderFeed();
            });
        });
        
        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            const nextTheme = document.body.classList.contains('light-theme') ? 'dark' : 'light';
            applyTheme(nextTheme);
        });

        // Favorites toggle button
        const favoritesToggle = document.getElementById('favoritesToggle');
        favoritesToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            // Toggle between 'all' and 'favorites'
            if (currentFilter === 'favorites') {
                currentFilter = 'all';
                favoritesToggle.textContent = '⭐ Show Favorites';
                favoritesToggle.style.background = '';
                favoritesToggle.style.color = '';
                document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
            } else {
                currentFilter = 'favorites';
                favoritesToggle.textContent = '★ Viewing Favorites';
                favoritesToggle.style.background = 'var(--accent)';
                favoritesToggle.style.color = 'white';
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            }
            renderFeed();
        });

        // Favorites management
        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem('marketIntelFavorites') || '[]');
            } catch { return []; }
        }

        function saveFavorites(favs) {
            localStorage.setItem('marketIntelFavorites', JSON.stringify(favs));
        }

        function toggleFavorite(id) {
            const favs = getFavorites();
            if (favs.includes(id)) {
                saveFavorites(favs.filter(f => f !== id));
            } else {
                saveFavorites(favs.concat(id));
            }
            renderFeed();
            updateFavoriteButtons();
        }

        function updateFavoriteButtons() {
            const favs = getFavorites();
            document.querySelectorAll('.favorite-btn').forEach(btn => {
                const id = btn.dataset.id;
                btn.textContent = favs.includes(id) ? '★' : '☆';
                btn.style.color = favs.includes(id) ? '#fbbf24' : 'var(--text-dim)';
            });
        }

        // Apply saved theme (default dark)
        applyTheme(getThemePreference());

        // Load on start
        loadFeed();
        
        // Auto-refresh every 5 minutes
        setInterval(loadFeed, 5 * 60 * 1000);
    </script>
</body>
</html>
