<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Daily Check</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --text-dim: #888;
            --accent: #4ade80;
            --accent-dim: #22c55e;
            --warning: #fbbf24;
            --danger: #f87171;
            --purple: #a78bfa;
            --blue: #60a5fa;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 24px;
            min-height: 100vh;
        }
        
        h1 { font-size: 1.5rem; margin-bottom: 4px; }
        h2 { font-size: 1rem; color: var(--text-dim); margin-bottom: 16px; }
        h3 { font-size: 0.875rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .header { margin-bottom: 32px; }
        .timestamp { color: var(--text-dim); font-size: 0.875rem; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        
        .stat-row {
            display: flex;
            gap: 16px;
            margin-top: 12px;
        }
        
        .stat {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: var(--bg);
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        
        .stat.todo .stat-value { color: var(--warning); }
        .stat.done .stat-value { color: var(--accent); }
        
        .task-list {
            list-style: none;
            margin-top: 12px;
        }
        
        .task-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        
        .task-list li:last-child { border-bottom: none; }
        
        .task-emoji { flex-shrink: 0; }
        
        .task-text {
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .task-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 4px;
        }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        .badge.success { background: rgba(74, 222, 128, 0.15); color: var(--accent); }
        .badge.warning { background: rgba(251, 191, 36, 0.15); color: var(--warning); }
        .badge.danger { background: rgba(248, 113, 113, 0.15); color: var(--danger); }
        .badge.info { background: rgba(167, 139, 250, 0.15); color: var(--purple); }
        
        .outcome-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }
        
        .goals-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        
        .goal-tag {
            background: var(--bg);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        
        .goal-tag.career { border-color: var(--purple); color: var(--purple); }
        .goal-tag.trading { border-color: var(--accent); color: var(--accent); }
        .goal-tag.personal { border-color: var(--blue); color: var(--blue); }
        
        .empty-state {
            text-align: center;
            padding: 20px;
            color: var(--text-dim);
            font-size: 0.875rem;
        }
        
        .refresh-btn {
            background: var(--accent-dim);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            margin-top: 16px;
        }
        
        .refresh-btn:hover { background: var(--accent); }
        
        .error-msg {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--danger);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--danger);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 Workspace Daily Check</h1>
        <h2>Autonomous workflow status at a glance</h2>
        <div class="timestamp">Last refreshed: <span id="refreshTime">--</span></div>
    </div>
    
    <div id="errorArea"></div>
    
    <div class="grid">
        <!-- Kanban Status -->
        <div class="card">
            <h3>📋 Kanban Board</h3>
            <div class="stat-row">
                <div class="stat todo">
                    <div class="stat-value" id="todoCount">--</div>
                    <div class="stat-label">Todo</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="inprogressCount">--</div>
                    <div class="stat-label">In Progress</div>
                </div>
                <div class="stat done">
                    <div class="stat-value" id="doneCount">--</div>
                    <div class="stat-label">Done</div>
                </div>
            </div>
            <div class="task-list" id="todoTasks">
                <div class="empty-state">Loading...</div>
            </div>
        </div>
        
        <!-- Last Executor -->
        <div class="card">
            <h3>⚙️ Last Executor Result</h3>
            <div class="outcome-row">
                <span class="badge" id="outcomeBadge">--</span>
                <span class="timestamp" id="executorTime">--</span>
            </div>
            <div id="executorTask" class="task-meta" style="margin-top: 12px;">--</div>
            <div id="executorDetails" class="task-meta" style="margin-top: 8px;">--</div>
        </div>
        
        <!-- Queue Status -->
        <div class="card">
            <h3>📬 Task Queue</h3>
            <div id="queueStatus">
                <div class="empty-state">Loading...</div>
            </div>
        </div>
    </div>
    
    <!-- Goals Summary -->
    <div class="card">
        <h3>🎯 Active Goals</h3>
        <div class="goals-list" id="goalsList">
            <div class="empty-state">Loading...</div>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    
    <script>
        // Use relative paths for HTTP serving (empty = same origin)
        const BASE = '';
        
        async function fetchJSON(path) {
            try {
                const resp = await fetch(path);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return await resp.json();
            } catch (e) {
                console.error(`Failed to load ${path}:`, e);
                return null;
            }
        }
        
        function timeAgo(ts) {
            if (!ts) return 'unknown';
            const date = new Date(ts);
            if (isNaN(date.getTime())) return ts;
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return `${diff}s ago`;
            if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
            return `${Math.floor(diff/86400)}d ago`;
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '--';
            // Handle formats like "2026-03-12 15:44"
            const date = new Date(timestamp.replace(' ', 'T'));
            if (isNaN(date.getTime())) return timestamp;
            return date.toLocaleString('en-US', { 
                month: 'short', day: 'numeric', 
                hour: '2-digit', minute: '2-digit',
                hour12: false 
            });
        }
        
        function extractEmoji(text) {
            const match = text.match(/^(\S+\s*){1}/);
            return match ? text.match(/^[^\w]*/)?.[0] || '📌' : '📌';
        }
        
        function renderTaskList(container, tasks, max = 5) {
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<div class="empty-state">No tasks</div>';
                return;
            }
            const html = tasks.slice(0, max).map(t => {
                const emoji = extractEmoji(t.text || '');
                const text = (t.text || '').replace(/^[^\w]*\s*/, '').substring(0, 100);
                return `<li><span class="task-emoji">${emoji}</span><span class="task-text">${text}</span></li>`;
            }).join('');
            container.innerHTML = `<ul class="task-list">${html}</ul>`;
            if (tasks.length > max) {
                container.innerHTML += `<div class="task-meta">+${tasks.length - max} more</div>`;
            }
        }
        
        async function loadData() {
            document.getElementById('refreshTime').textContent = new Date().toLocaleTimeString('en-US', { 
                hour: '2-digit', minute: '2-digit', hour12: false 
            });
            
            const [board, executor, queue] = await Promise.all([
                fetchJSON(`${BASE}/projects/autonomous-kanban/public/board.json`),
                fetchJSON(`${BASE}/memory/executor-last-result.json`),
                fetchJSON(`${BASE}/memory/executor-subagent-queue.json`)
            ]);
            
            // Render Kanban
            if (board?.board) {
                const b = board.board;
                document.getElementById('todoCount').textContent = b.todo?.length || 0;
                document.getElementById('inprogressCount').textContent = b.inprogress?.length || 0;
                document.getElementById('doneCount').textContent = b.done?.length || 0;
                renderTaskList(document.getElementById('todoTasks'), b.todo);
            } else {
                document.getElementById('errorArea').innerHTML = '<div class="error-msg">Could not load kanban data. Try running from workspace root with a local server.</div>';
            }
            
            // Render Executor
            if (executor) {
                const badge = document.getElementById('outcomeBadge');
                badge.textContent = executor.outcome || 'unknown';
                badge.className = 'badge ' + (
                    executor.outcome === 'completed' ? 'success' :
                    executor.outcome === 'needs_input' ? 'warning' :
                    executor.outcome === 'failed' ? 'danger' : 'info'
                );
                document.getElementById('executorTime').textContent = formatTime(executor.timestamp);
                document.getElementById('executorTask').textContent = (executor.task || '').substring(0, 120);
                document.getElementById('executorDetails').textContent = executor.details || '';
            }
            
            // Render Queue
            const queueEl = document.getElementById('queueStatus');
            if (queue && queue.length > 0) {
                const active = queue.filter(q => q.status === 'spawned');
                const pending = queue.filter(q => q.status === 'pending');
                queueEl.innerHTML = `
                    <div class="stat-row">
                        <div class="stat">
                            <div class="stat-value">${active.length}</div>
                            <div class="stat-label">Active</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${pending.length}</div>
                            <div class="stat-label">Pending</div>
                        </div>
                    </div>
                `;
            } else {
                queueEl.innerHTML = '<div class="empty-state">✅ Queue empty - no pending tasks</div>';
            }
            
            // Goals (hardcoded from AUTONOMOUS.md structure)
            const goalsEl = document.getElementById('goalsList');
            goalsEl.innerHTML = `
                <span class="goal-tag career">🎨 Career (Blender/AE/Unreal)</span>
                <span class="goal-tag trading">📈 Trading ($200/day)</span>
                <span class="goal-tag personal">🐍 Python</span>
                <span class="goal-tag personal">🇯🇵 Japanese</span>
                <span class="goal-tag">⚙️ Automation</span>
            `;
        }
        
        loadData();
    </script>
</body>
</html>
