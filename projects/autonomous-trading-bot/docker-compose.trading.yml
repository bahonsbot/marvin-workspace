services:
  marvin-trading-bot:
    container_name: marvin-trading-bot
    build:
      context: /data/.openclaw/workspace/projects/autonomous-trading-bot
      dockerfile: Dockerfile.trading
    env_file:
      - .env.runtime-trading
    working_dir: /app
    command: ["python3", "-m", "src.webhook_receiver"]
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - /data/.openclaw/workspace/projects/autonomous-trading-bot:/app
      - /data/.openclaw/workspace/projects/market-intel/data:/market-intel/data:ro
      - /data/.openclaw/workspace/projects/market-intel-news-reader/data:/market-intel-news-reader/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - marvin-trading-net

networks:
  marvin-trading-net:
    driver: bridge
