# GitHub Pages deployment workflow
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/autonomous-kanban/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build autonomous-kanban
        working-directory: projects/autonomous-kanban
        env:
          GITHUB_PAGES: "true"
        run: |
          npm ci
          npm run build

      - name: Prepare combined Pages artifact
        run: |
          rm -rf .pages-site
          mkdir -p .pages-site
          cp -R projects/market-intel-news-reader/app/* .pages-site/
          mkdir -p .pages-site/autonomous-kanban
          cp -R projects/autonomous-kanban/out/* .pages-site/autonomous-kanban/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.pages-site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
